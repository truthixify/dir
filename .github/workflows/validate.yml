name: Validate ideas

on:
  pull_request:
    paths:
      - "ideas/**"
      - "schema/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-save ajv ajv-formats gray-matter
      - run: npm run validate
